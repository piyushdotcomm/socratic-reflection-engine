services:
  - type: web
    name: socratic-reflection-engine-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: FEATHERLESS_API_KEY
        sync: false
      - key: HF_API_KEY
        sync: false
      - key: HF_MODEL_ID
        value: piyushdotcomm/sugar-reflection-lora
      - key: DEFAULT_LLM_PROVIDER
        value: gemini
